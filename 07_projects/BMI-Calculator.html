<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #000000, #1a1a1a);
      color: white;
    }

    .container{
      background: #111;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
      text-align: center;
    }

    h1{
      margin-bottom: 20px;
    }

    input{
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      outline: none;
      font-size: 16px;
    }

    button{
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: white;
      color: black;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover{
      background: #ddd;
    }

    .result{
      margin-top: 20px;
      font-size: 18px;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>BMI Calculator</h1>

    <input id="weight" type="number" placeholder="Enter Weight (kg)">
    <input id="height" type="number" placeholder="Enter Height (cm)">

    <button>Calculate BMI</button>

    <div class="result">Your BMI will show here</div>

  </div>

</body>
<script>
const height = document.getElementById("height")
const weight = document.getElementById("weight")
const button = document.querySelector("button")
const result = document.querySelector(".result")

button.addEventListener("click", function(){
    let h = height.value 
    let w = weight.value 

    let heightInMeter = h/100
    let bmi = w / (heightInMeter * heightInMeter )
    // bmi.foor(2)
    result.innerHTML = `Your BMI is ${bmi}`
       // categories (optional but useful)
    if(bmi < 18.5){
        result.innerHTML += " (Underweight)"
    }
    else if(bmi >= 18.5 && bmi < 24.9){
        result.innerHTML += " (Normal)"
    }
    else if(bmi >= 25 && bmi < 29.9){
        result.innerHTML += " (Overweight)"
    }
    else{
        result.innerHTML += " (Obese)"
    }
})

</script>
</html>
