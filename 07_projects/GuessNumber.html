<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess The Number</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #141e30, #243b55);
    }

    .container{
      width: 400px;
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      color: white;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      margin-bottom: 15px;
      font-size: 35px;
    }

    p{
      margin-bottom: 20px;
      font-size: 18px;
    }

    input{
      width: 100%;
      padding: 12px;
      border: none;
      outline: none;
      border-radius: 10px;
      font-size: 18px;
      margin-bottom: 20px;
      text-align: center;
    }

    button{
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      background: #00b894;
      color: white;
      transition: 0.3s;
    }

    button:hover{
      background: #019875;
    }

    .result{
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .attempts{
      margin-top: 10px;
      font-size: 18px;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Guess The Number</h1>

    <p>Guess a number between 1 to 100</p>

<input class="input" type="number" min="1" max="100" placeholder="Enter your guess">

    <button class="button">Check</button>

    <div class="result">
      Start Guessing...
    </div>

    <div class="attempts">
      Attempts Left: 10
    </div>

  </div>

</body>
<script>
   const randomNumber = parseInt(Math.random() * 100 + 1);

const inputType = document.querySelector(".input");
const button = document.querySelector(".button");
const attemptsText = document.querySelector(".attempts");
const result = document.querySelector(".result");

let attempts = 10;

attemptsText.innerHTML = `Attempts Left: ${attempts}`;

button.addEventListener("click", function () {

    const guess = Number(inputType.value);

    attempts--; // 🔥 yahan decrement ho raha hai

    attemptsText.innerHTML = `Attempts Left: ${attempts}`; // 🔥 update UI

    if (guess === randomNumber) {
        result.innerHTML = "You Win";
        button.disabled = true;
    }
    else if (guess < randomNumber) {
        result.innerHTML = "Too Low";
    }
    else {
        result.innerHTML = "Too High";
    }

    if (attempts === 0) {
        result.innerHTML = `Game Over! Number was ${randomNumber}`;
        button.disabled = true;
    }

});
</script>
</html>
