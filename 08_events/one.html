<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f4f4;
        padding: 40px;
      }

      .container {
        width: 90%;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      ul {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        list-style: none;
      }

      li img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 10px;
      }

      .link {
        display: inline-block;
        margin-top: 20px;
        text-decoration: none;
        background: #00b894;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
      }

      .link:hover {
        background: #019875;
      }
    </style>
  </head>
